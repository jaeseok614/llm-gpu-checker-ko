name: Benchmark report
description: 실제 실행 결과를 제보합니다. scripts/benchmark-cli.mjs로 측정했다면 출력된 JSON을 그대로 붙여넣어도 됩니다.
title: "[Benchmark] "
labels: ["benchmark"]
body:
  - type: markdown
    attributes:
      value: |
        `node scripts/benchmark-cli.mjs --runtime ollama --model <모델> --context <길이>` (llama.cpp는 `--runtime llamacpp`)로 실행하면
        아래 JSON 칸에 그대로 붙여넣을 수 있는 결과가 출력됩니다. **CLI JSON 또는 아래 수동 입력 항목 중 한쪽**을 채워 주세요.
  - type: textarea
    id: cli_json
    attributes:
      label: CLI 측정 결과 (JSON)
      description: scripts/benchmark-cli.mjs 출력의 JSON 블록을 그대로 붙여넣어 주세요. CLI JSON을 넣었다면 아래 수동 항목은 비워도 됩니다.
      render: json
    validations:
      required: false
  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: RTX 4090 24GB
    validations:
      required: false
  - type: input
    id: model
    attributes:
      label: 모델
      placeholder: Qwen2.5 32B Instruct
    validations:
      required: false
  - type: input
    id: runtime
    attributes:
      label: 런타임
      placeholder: Ollama, llama.cpp, vLLM, Transformers
    validations:
      required: false
  - type: input
    id: settings
    attributes:
      label: 실행 설정
      placeholder: Q4_K_M, 8K context, concurrency 1
    validations:
      required: false
  - type: input
    id: result
    attributes:
      label: 실제 결과
      placeholder: OOM 없음, 32 tok/s
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 로그 또는 참고 자료
      description: 가능하면 명령어, VRAM 사용량, 토큰 속도 로그를 붙여 주세요.
