<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM GPU 실행 가능성 계산기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <img src="./assets/gpu-board.svg" alt="" class="brand-mark" />
        <div>
          <p class="eyebrow">Korean AI Hardware Fit</p>
          <h1>LLM GPU 실행 가능성 계산기</h1>
        </div>
      </div>
      <div class="header-status" id="hardwareStatus">GPU 정보를 입력해 주세요</div>
    </header>

    <main class="app-shell">
      <section class="hardware-panel" aria-label="하드웨어 설정">
        <div class="hardware-topline">
          <div class="hardware-copy">
            <span class="section-kicker">내 하드웨어</span>
            <strong id="hardwareHeadline">GeForce RTX 4090 24GB · RAM 64GB · GPU 1개</strong>
            <p id="hardwareSubline">현재 기준: 8K · 동시 1명 · llama.cpp / Ollama</p>
          </div>
        </div>

        <div class="settings-panel" id="hardwareEditor">
          <label class="field field-wide">
            <span>GPU 프리셋 / 검색</span>
            <select id="gpuPreset"></select>
            <input id="gpuSearch" type="search" list="gpuPresetList" placeholder="예: RTX 4090, H100, A100" aria-label="GPU 프리셋 검색" />
            <datalist id="gpuPresetList"></datalist>
          </label>
          <label class="field">
            <span>VRAM</span>
            <input id="vramGb" type="number" min="2" max="640" step="1" value="24" />
          </label>
          <label class="field">
            <span>시스템 RAM</span>
            <input id="ramGb" type="number" min="8" max="2048" step="1" value="64" />
          </label>
          <label class="field">
            <span>GPU 수</span>
            <input id="gpuCount" type="number" min="1" max="16" step="1" value="1" />
          </label>
          <label class="field">
            <span>대역폭 GB/s</span>
            <input id="bandwidth" type="number" min="100" max="12000" step="10" value="1008" />
          </label>
        </div>

        <div class="workload-tabs" role="tablist" aria-label="모델 종류">
          <button type="button" class="workload-tab is-active" data-workload-tab="generative" aria-selected="true">생성형 LLM</button>
          <button type="button" class="workload-tab" data-workload-tab="embedding" aria-selected="false">임베딩</button>
          <button type="button" class="workload-tab" data-workload-tab="reranker" aria-selected="false">리랭커</button>
          <button type="button" class="workload-tab" data-workload-tab="ocrPipeline" aria-selected="false">경량 OCR</button>
          <button type="button" class="workload-tab" data-workload-tab="documentVlm" aria-selected="false">문서 VLM</button>
          <button type="button" class="workload-tab" data-workload-tab="generalVlm" aria-selected="false">범용 VLM</button>
        </div>

        <div class="settings-panel advanced-panel workload-settings" data-workload-settings="generative">
          <label class="field">
            <span>컨텍스트 토큰</span>
            <div class="field-control-pair">
              <select id="contextPreset" data-preset-target="contextSize" aria-label="컨텍스트 프리셋">
                <option value="4096">4K</option>
                <option value="8192" selected>8K</option>
                <option value="16384">16K</option>
                <option value="32768">32K</option>
                <option value="65536">64K</option>
                <option value="131072">128K</option>
                <option value="262144">256K</option>
                <option value="524288">512K</option>
                <option value="1048576">1M</option>
                <option value="custom">직접</option>
              </select>
              <input id="contextSize" data-direct-preset="contextPreset" type="number" min="512" max="1048576" step="512" value="8192" aria-label="컨텍스트 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>동시 요청</span>
            <div class="field-control-pair">
              <select id="concurrencyPreset" data-preset-target="concurrency" aria-label="동시 요청 프리셋">
                <option value="1" selected>1명</option>
                <option value="2">2명</option>
                <option value="4">4명</option>
                <option value="8">8명</option>
                <option value="16">16명</option>
                <option value="32">32명</option>
                <option value="64">64명</option>
                <option value="custom">직접</option>
              </select>
              <input id="concurrency" data-direct-preset="concurrencyPreset" type="number" min="1" max="256" step="1" value="1" aria-label="동시 요청 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>평균 출력 토큰</span>
            <div class="field-control-pair">
              <select id="outputTokensPreset" data-preset-target="outputTokens" aria-label="평균 출력 프리셋">
                <option value="256">256 토큰</option>
                <option value="512" selected>512 토큰</option>
                <option value="1024">1K 토큰</option>
                <option value="2048">2K 토큰</option>
                <option value="4096">4K 토큰</option>
                <option value="8192">8K 토큰</option>
                <option value="custom">직접</option>
              </select>
              <input id="outputTokens" data-direct-preset="outputTokensPreset" type="number" min="16" max="65536" step="16" value="512" aria-label="평균 출력 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>KV cache</span>
            <select id="kvPrecision">
              <option value="fp16" selected>FP16/BF16</option>
              <option value="fp8">FP8</option>
              <option value="q8">Q8</option>
              <option value="q4">Q4</option>
            </select>
          </label>
          <label class="field">
            <span>양자화</span>
            <select id="quantization"></select>
          </label>
          <label class="field">
            <span>실행 방식</span>
            <select id="runtimeMode">
              <option value="llamacpp">llama.cpp / Ollama</option>
              <option value="vllm">vLLM</option>
              <option value="transformers">Transformers</option>
            </select>
          </label>
        </div>

        <div class="settings-panel advanced-panel workload-settings" data-workload-settings="embedding" hidden>
          <label class="field">
            <span>평균 입력 길이</span>
            <div class="field-control-pair">
              <select id="embeddingInputTokensPreset" data-preset-target="embeddingInputTokens" aria-label="평균 입력 길이 프리셋">
                <option value="128">128 토큰</option>
                <option value="256">256 토큰</option>
                <option value="384" selected>384 토큰</option>
                <option value="512">512 토큰</option>
                <option value="1024">1K 토큰</option>
                <option value="2048">2K 토큰</option>
                <option value="4096">4K 토큰</option>
                <option value="8192">8K 토큰</option>
                <option value="32768">32K 토큰</option>
                <option value="custom">직접</option>
              </select>
              <input id="embeddingInputTokens" data-direct-preset="embeddingInputTokensPreset" type="number" min="1" max="32768" step="1" value="384" aria-label="평균 입력 길이 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>배치 크기</span>
            <div class="field-control-pair">
              <select id="embeddingBatchSizePreset" data-preset-target="embeddingBatchSize" aria-label="임베딩 배치 프리셋">
                <option value="1">1개</option>
                <option value="8">8개</option>
                <option value="16">16개</option>
                <option value="32" selected>32개</option>
                <option value="64">64개</option>
                <option value="128">128개</option>
                <option value="256">256개</option>
                <option value="custom">직접</option>
              </select>
              <input id="embeddingBatchSize" data-direct-preset="embeddingBatchSizePreset" type="number" min="1" max="1024" step="1" value="32" aria-label="임베딩 배치 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>정밀도</span>
            <select id="encoderPrecision"></select>
          </label>
          <label class="field">
            <span>실행 방식</span>
            <select id="encoderRuntime">
              <option value="sentenceTransformers">Sentence Transformers</option>
              <option value="tei" selected>TEI</option>
              <option value="onnx">ONNX / OpenVINO</option>
              <option value="pytorch">PyTorch 직접 실행</option>
            </select>
          </label>
          <label class="field">
            <span>최대 배치 토큰</span>
            <div class="field-control-pair">
              <select id="embeddingBatchTokensPreset" data-preset-target="embeddingBatchTokens" aria-label="최대 배치 토큰 프리셋">
                <option value="8192">8K</option>
                <option value="16384" selected>16K</option>
                <option value="32768">32K</option>
                <option value="65536">64K</option>
                <option value="131072">128K</option>
                <option value="custom">직접</option>
              </select>
              <input id="embeddingBatchTokens" data-direct-preset="embeddingBatchTokensPreset" type="number" min="512" max="1048576" step="512" value="16384" aria-label="최대 배치 토큰 직접 입력" />
            </div>
          </label>
        </div>

        <div class="settings-panel advanced-panel workload-settings" data-workload-settings="reranker" hidden>
          <label class="field">
            <span>질의 길이</span>
            <div class="field-control-pair">
              <select id="rerankerQueryTokensPreset" data-preset-target="rerankerQueryTokens" aria-label="질의 길이 프리셋">
                <option value="32">32 토큰</option>
                <option value="64" selected>64 토큰</option>
                <option value="128">128 토큰</option>
                <option value="256">256 토큰</option>
                <option value="custom">직접</option>
              </select>
              <input id="rerankerQueryTokens" data-direct-preset="rerankerQueryTokensPreset" type="number" min="1" max="8192" step="1" value="64" aria-label="질의 길이 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>문서 길이</span>
            <div class="field-control-pair">
              <select id="rerankerDocTokensPreset" data-preset-target="rerankerDocTokens" aria-label="문서 길이 프리셋">
                <option value="256">256 토큰</option>
                <option value="512" selected>512 토큰</option>
                <option value="1024">1K 토큰</option>
                <option value="2048">2K 토큰</option>
                <option value="4096">4K 토큰</option>
                <option value="custom">직접</option>
              </select>
              <input id="rerankerDocTokens" data-direct-preset="rerankerDocTokensPreset" type="number" min="1" max="32768" step="1" value="512" aria-label="문서 길이 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>후보 문서</span>
            <div class="field-control-pair">
              <select id="rerankerCandidatesPreset" data-preset-target="rerankerCandidates" aria-label="후보 문서 프리셋">
                <option value="10">10개</option>
                <option value="20">20개</option>
                <option value="40" selected>40개</option>
                <option value="80">80개</option>
                <option value="120">120개</option>
                <option value="custom">직접</option>
              </select>
              <input id="rerankerCandidates" data-direct-preset="rerankerCandidatesPreset" type="number" min="1" max="10000" step="1" value="40" aria-label="후보 문서 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>배치 크기</span>
            <div class="field-control-pair">
              <select id="rerankerBatchSizePreset" data-preset-target="rerankerBatchSize" aria-label="리랭커 배치 프리셋">
                <option value="1">1쌍</option>
                <option value="8">8쌍</option>
                <option value="16" selected>16쌍</option>
                <option value="32">32쌍</option>
                <option value="64">64쌍</option>
                <option value="custom">직접</option>
              </select>
              <input id="rerankerBatchSize" data-direct-preset="rerankerBatchSizePreset" type="number" min="1" max="1024" step="1" value="16" aria-label="리랭커 배치 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>정밀도</span>
            <select id="rerankerPrecision"></select>
          </label>
          <label class="field">
            <span>실행 방식</span>
            <select id="rerankerRuntime">
              <option value="sentenceTransformers">Sentence Transformers</option>
              <option value="tei" selected>TEI</option>
              <option value="onnx">ONNX / OpenVINO</option>
              <option value="pytorch">PyTorch 직접 실행</option>
            </select>
          </label>
        </div>

        <div class="settings-panel advanced-panel workload-settings" data-workload-settings="vision" hidden>
          <label class="field">
            <span>문서 크기</span>
            <select id="ocrResolutionPreset">
              <option value="a4-200" selected>A4 200 DPI</option>
              <option value="a4-300">A4 300 DPI</option>
              <option value="screen-1080">웹/스크린샷 1080p</option>
              <option value="receipt">영수증/라벨</option>
              <option value="custom">직접</option>
            </select>
          </label>
          <label class="field">
            <span>이미지 너비</span>
            <input id="ocrWidth" type="number" min="320" max="10000" step="16" value="1654" />
          </label>
          <label class="field">
            <span>이미지 높이</span>
            <input id="ocrHeight" type="number" min="320" max="14000" step="16" value="2339" />
          </label>
          <label class="field">
            <span>배치 페이지</span>
            <div class="field-control-pair">
              <select id="ocrBatchSizePreset" data-preset-target="ocrBatchSize" aria-label="OCR 배치 페이지 프리셋">
                <option value="1" selected>1페이지</option>
                <option value="2">2페이지</option>
                <option value="4">4페이지</option>
                <option value="8">8페이지</option>
                <option value="16">16페이지</option>
                <option value="32">32페이지</option>
                <option value="custom">직접</option>
              </select>
              <input id="ocrBatchSize" data-direct-preset="ocrBatchSizePreset" type="number" min="1" max="256" step="1" value="1" aria-label="OCR 배치 페이지 직접 입력" />
            </div>
          </label>
          <label class="field">
            <span>정밀도</span>
            <select id="ocrPrecision"></select>
          </label>
          <label class="field">
            <span>처리 기능</span>
            <select id="ocrFeatureSet">
              <option value="text" selected>텍스트 OCR</option>
              <option value="layout">레이아웃 포함</option>
              <option value="table">표/수식 포함</option>
              <option value="full">문서 파싱 전체</option>
            </select>
          </label>
        </div>
      </section>

      <section class="results-panel" aria-label="모델 검색 결과">
        <div class="summary-filterbar" id="summaryGrid"></div>

        <div class="toolbar">
          <div class="search-wrap">
            <input id="searchInput" type="search" placeholder="모델명, 제조사, 태그 검색" />
          </div>
          <select id="gradeFilter" aria-label="실행 등급">
            <option value="all">전체 등급</option>
            <option value="fit">가능 이상</option>
            <option value="S">쾌적</option>
            <option value="A">잘 돌아감</option>
            <option value="B">가능</option>
            <option value="C">빡빡함</option>
            <option value="D">오프로딩</option>
            <option value="F">부적합</option>
          </select>
          <select id="taskFilter" aria-label="작업 유형">
            <option value="all">전체 작업</option>
            <option value="general">일반 챗봇</option>
            <option value="korean">한국어</option>
            <option value="coding">코딩</option>
            <option value="reasoning">추론</option>
            <option value="long">긴 문서</option>
            <option value="vision">비전/멀티모달</option>
          </select>
          <select id="providerFilter" aria-label="공급사">
            <option value="all">전체 공급사</option>
          </select>
          <select id="licenseFilter" aria-label="라이선스">
            <option value="all">전체 라이선스</option>
          </select>
          <select id="sortBy" aria-label="정렬">
            <option value="fit">추천순</option>
            <option value="speed">예상 속도순</option>
            <option value="quality">품질 우선</option>
            <option value="vramAsc">필요 VRAM 낮은 순</option>
            <option value="sizeDesc">파라미터 큰 순</option>
            <option value="latest">최신 모델순</option>
          </select>
          <div class="view-toggle" aria-label="보기 방식">
            <button type="button" id="listViewButton" class="toggle-button is-active" aria-pressed="true">목록</button>
            <button type="button" id="cardViewButton" class="toggle-button" aria-pressed="false">카드</button>
          </div>
        </div>

        <div class="result-meta" id="resultMeta">모델 0개</div>
        <div class="model-results" id="modelResults"></div>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside class="model-detail" id="modelDetail" aria-label="모델 상세 분석" hidden></aside>

    <footer class="app-footer">
      <span>계산값은 로컬 추정치입니다. 실제 결과는 드라이버, CUDA/ROCm, 프레임워크, 배치 크기, KV cache, OCR 전처리 설정에 따라 달라집니다.</span>
    </footer>

    <script src="./data/gpus.js" defer></script>
    <script src="./data/quantizations.js" defer></script>
    <script src="./data/precision-profiles.js" defer></script>
    <script src="./data/models.js" defer></script>
    <script src="./data/embedding-models.js" defer></script>
    <script src="./data/reranker-models.js" defer></script>
    <script src="./data/ocr-models.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
